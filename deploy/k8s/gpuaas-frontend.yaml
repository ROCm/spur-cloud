apiVersion: v1
kind: Service
metadata:
  name: spur-cloud-frontend
  namespace: spur-cloud
spec:
  selector:
    app: spur-cloud-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spur-cloud-frontend
  namespace: spur-cloud
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spur-cloud-frontend
  template:
    metadata:
      labels:
        app: spur-cloud-frontend
    spec:
      containers:
        - name: nginx
          image: spur-cloud-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spur-cloud
  namespace: spur-cloud
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  rules:
    - host: gpu.example.com  # Replace with actual domain
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: spur-cloud-api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spur-cloud-frontend
                port:
                  number: 80
